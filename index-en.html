<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Inventory - A free tool from www.akvarellskiss.se</title>
    <style>
        :root {
            --primary-color: #4a3728; /* Deep rich brown from your reference style */
            --primary-hover: #36281d;
            --accent-color: #8c7355;  /* Muted earth tone */
            --danger-color: #a94442;
            --danger-hover: #843534;
            --success-color: #5b7053; /* Sage/olive green */
            --success-hover: #45533e;
            --light-bg: #fdfcfb;      /* Soft warm off-white canvas */
            --panel-bg: #f8f5f1;     /* Cream/beige background for controls */
            --card-bg: #ffffff;
            --text-color: #2b2520;
            --text-muted: #70655c;
            --border-color: #d1c7bd;  /* Warm grey border */
            --radius: 6px;
            --shadow-sm: 0 2px 4px rgba(74, 55, 40, 0.05);
            --shadow-md: 0 6px 12px rgba(74, 55, 40, 0.08);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            line-height: 1.5;
            padding-bottom: 60px;
        }

        header {
            background-color: var(--primary-color);
            color: #f8f5f1;
            padding: 24px 15px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        header a {
            color: #e2dacb;
            text-decoration: none;
            border-bottom: 1px dashed #e2dacb;
            transition: var(--transition);
        }

        header a:hover {
            color: #ffffff;
            border-bottom-style: solid;
        }

        .container {
            max-width: 1240px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Toolbar styles */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            background-color: var(--panel-bg);
            padding: 18px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            margin-bottom: 35px;
        }

        .toolbar-info {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--primary-color);
        }

        .toolbar-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Controls Block (Sort option matching your image style) */
        .gallery-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--text-muted);
        }

        /* Form elements & Select styles matching screenshot */
        .form-control, .select-control {
            background-color: #ffffff;
            color: var(--text-color);
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 0.95rem;
            transition: var(--transition);
            width: 100%;
        }
